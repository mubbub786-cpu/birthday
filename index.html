<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💗 | Mʀ᭄_Aғʀɪᴅɪ࿐</title><title>For You 💗 | Mʀ᭄_Aғʀɪᴅɪ࿐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Music Audio Player -->
    <audio id="bgMusic" src="birthday.mp3" loop></audio>

    <!-- Main Animation Workspace Area -->
    <div class="fullscreen-animation-area">
        
        <!-- Small Pink Heart Trigger Screen (Exact Center) -->
        <div id="startScreen" class="start-screen">
            <button id="heartBtn" class="heart-trigger">💗</button>
            <p class="click-prompt">Open with love ✨</p>
        </div>

        <!-- Hidden Simulation Wrapper -->
        <div id="mainWorkspace" class="workspace hidden">
            <!-- Left Panel: Text Stack -->
            <div class="message-panel">
    <p id="l1"></p>
    <p id="l2"></p>
    <p id="l3"></p>
    <p id="l4"></p>
    <p id="l5"></p>
    <p id="l6"></p>
    <p id="l7"></p>
    <p id="l8"></p>
    <p id="l9"></p>
    <p id="l10"></p>
</div>
            
            <!-- Right Panel: Tree View Canvas -->
            <div class="canvas-panel">
                <canvas id="treeCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
